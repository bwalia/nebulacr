# ============================================================================
# GitLab CI: Build, Scan, and Push to NebulaCR (Zero-Trust OIDC Flow)
#
# This pipeline demonstrates NebulaCR's zero-trust CI/CD integration with
# GitLab CI/CD using native OIDC identity tokens (GitLab 15.7+).
#
# Pipeline stages:
#   1. build   -- Build the Docker image (or Kaniko for non-Docker runners)
#   2. scan    -- Scan the image for vulnerabilities with Trivy
#   3. push    -- Push the verified image to NebulaCR
#   4. deploy  -- Update deployment manifests (optional)
#
# Security properties:
#   - No long-lived secrets or CI/CD variables required
#   - GitLab OIDC tokens are short-lived and audience-bound
#   - NebulaCR access tokens expire after 5 minutes
#   - Least-privilege: each stage requests only the permissions it needs
#   - Subject binding ensures only authorized projects/branches can push
#
# Prerequisites:
#   - GitLab 15.7+ (for native id_tokens support)
#   - Configure NebulaCR auth service to trust GitLab's OIDC issuer:
#       issuer_url = "https://gitlab.com"   (or your self-hosted instance)
#       client_id  = "nebulacr"
#   - Create a tenant and project in NebulaCR
#   - Create an access policy binding the GitLab subject to a role:
#       subject = "project_path:my-group/my-project:ref_type:branch:ref:main"
#       role    = "push"
#
# ============================================================================

# ---------------------------------------------------------------------------
# Pipeline stages -- executed in order, with jobs in each stage running
# in parallel by default.
# ---------------------------------------------------------------------------
stages:
  - build
  - scan
  - push
  - deploy

# ---------------------------------------------------------------------------
# Global variables
# ---------------------------------------------------------------------------
variables:
  # NebulaCR connection settings -- override in GitLab CI/CD Variables
  # (Settings > CI/CD > Variables) for per-project configuration.
  NEBULACR_REGISTRY: registry.example.com:5000
  NEBULACR_AUTH_URL: https://auth.example.com:5001
  NEBULACR_TENANT: my-org
  NEBULACR_PROJECT: my-project
  IMAGE_NAME: my-app

  # Full image reference (assembled from components above)
  IMAGE_REF: "${NEBULACR_REGISTRY}/${NEBULACR_TENANT}/${NEBULACR_PROJECT}/${IMAGE_NAME}"

  # Docker-in-Docker settings
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2

# ---------------------------------------------------------------------------
# OIDC Identity Token
# ---------------------------------------------------------------------------
# GitLab's id_tokens keyword (15.7+) generates a short-lived JWT containing:
#
#   iss: "https://gitlab.com"  (or your self-hosted URL)
#   sub: "project_path:my-group/my-project:ref_type:branch:ref:main"
#   aud: "nebulacr"
#   namespace_path: "my-group"
#   project_path: "my-group/my-project"
#   ref: "main"
#   ref_type: "branch"
#   pipeline_id: "12345678"
#
# The audience ("nebulacr") must match the client_id configured in the
# NebulaCR OIDC provider settings. The token is available to all jobs
# as the GITLAB_OIDC_TOKEN environment variable.
# ---------------------------------------------------------------------------
id_tokens:
  GITLAB_OIDC_TOKEN:
    aud: nebulacr

# ---------------------------------------------------------------------------
# Helper function: Exchange GitLab OIDC token for NebulaCR access token
# ---------------------------------------------------------------------------
# Defined as a YAML anchor so it can be reused across stages without
# code duplication. Each stage calls this with its own scope (actions).
# ---------------------------------------------------------------------------
.nebulacr_auth: &nebulacr_auth
  # Install dependencies (Alpine-based Docker image)
  - apk add --no-cache curl jq
  # Exchange OIDC token for NebulaCR token
  - |
    nebulacr_authenticate() {
      local ACTIONS="$1"  # JSON array, e.g., '["pull"]' or '["pull", "push"]'

      echo "Authenticating to NebulaCR..."
      echo "  Auth URL:   ${NEBULACR_AUTH_URL}"
      echo "  Tenant:     ${NEBULACR_TENANT}"
      echo "  Project:    ${NEBULACR_PROJECT}"
      echo "  Repository: ${IMAGE_NAME}"
      echo "  Actions:    ${ACTIONS}"

      RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
        "${NEBULACR_AUTH_URL}/auth/token" \
        -H "Content-Type: application/json" \
        -H "User-Agent: nebulacr-gitlab-ci/1.0" \
        -d "{
          \"identity_token\": \"${GITLAB_OIDC_TOKEN}\",
          \"scope\": {
            \"tenant\": \"${NEBULACR_TENANT}\",
            \"project\": \"${NEBULACR_PROJECT}\",
            \"repository\": \"${IMAGE_NAME}\",
            \"actions\": ${ACTIONS}
          }
        }")

      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" != "200" ]; then
        echo "ERROR: NebulaCR authentication failed (HTTP ${HTTP_CODE})"
        echo "$BODY" | jq -r '.error // "unknown error"' 2>/dev/null
        echo "$BODY" | jq -r '.message // ""' 2>/dev/null
        return 1
      fi

      # Export the token for use in subsequent commands
      export NEBULACR_TOKEN=$(echo "$BODY" | jq -r '.token')
      EXPIRES_IN=$(echo "$BODY" | jq -r '.expires_in // "unknown"')
      TOKEN_ID=$(echo "$BODY" | jq -r '.token_id // "unknown"')

      echo "NebulaCR token obtained successfully"
      echo "  Token ID:   ${TOKEN_ID}"
      echo "  Expires in: ${EXPIRES_IN}s"
    }

# ---------------------------------------------------------------------------
# Helper: Docker login using NebulaCR token
# ---------------------------------------------------------------------------
.docker_login: &docker_login
  - echo "${NEBULACR_TOKEN}" | docker login "${NEBULACR_REGISTRY}" --username "gitlab-ci" --password-stdin

# ===========================================================================
# Stage: build
#
# Build the Docker image using Docker-in-Docker (DinD).
# The image is saved as a tarball artifact for the scan and push stages.
# ===========================================================================
build:docker:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    *nebulacr_auth
  script:
    # Authenticate with pull scope (for base image layers from NebulaCR)
    - nebulacr_authenticate '["pull"]'
    - *docker_login

    # Build the image with OCI labels for traceability
    - |
      docker build --pull \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --label "org.opencontainers.image.title=${IMAGE_NAME}" \
        --label "org.opencontainers.image.version=${CI_COMMIT_REF_NAME}" \
        --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --build-arg VCS_REF="${CI_COMMIT_SHA}" \
        -t "${IMAGE_REF}:${CI_COMMIT_SHA}" \
        -t "${IMAGE_REF}:${CI_COMMIT_REF_SLUG}" \
        .

    # Also tag as "latest" on main branch
    - |
      if [ "${CI_COMMIT_BRANCH}" = "main" ]; then
        docker tag "${IMAGE_REF}:${CI_COMMIT_SHA}" "${IMAGE_REF}:latest"
      fi

    # Save image as tarball for downstream stages
    - mkdir -p /build
    - docker save "${IMAGE_REF}:${CI_COMMIT_SHA}" -o /build/image.tar
    - echo "${CI_COMMIT_SHA}" > /build/digest.txt

  after_script:
    - docker logout "${NEBULACR_REGISTRY}" 2>/dev/null || true
  artifacts:
    paths:
      - /build/image.tar
      - /build/digest.txt
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ===========================================================================
# Stage: build (Kaniko alternative)
#
# For environments where Docker-in-Docker is not available (e.g.,
# Kubernetes runners without privileged mode), use Kaniko to build
# images without a Docker daemon.
#
# Kaniko runs entirely in userspace and does not require the Docker
# socket or privileged containers. This is the recommended approach
# for shared/hosted GitLab runners.
# ===========================================================================
build:kaniko:
  stage: build
  # The Kaniko executor image includes the build tool
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script:
    # Kaniko uses /kaniko/.docker/config.json for registry auth
    - apk add --no-cache curl jq 2>/dev/null || true
  script:
    # Authenticate to NebulaCR and write Docker config for Kaniko
    - |
      # Manually exchange OIDC token (Kaniko image may not have full shell)
      RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
        "${NEBULACR_AUTH_URL}/auth/token" \
        -H "Content-Type: application/json" \
        -d "{
          \"identity_token\": \"${GITLAB_OIDC_TOKEN}\",
          \"scope\": {
            \"tenant\": \"${NEBULACR_TENANT}\",
            \"project\": \"${NEBULACR_PROJECT}\",
            \"repository\": \"${IMAGE_NAME}\",
            \"actions\": [\"pull\", \"push\"]
          }
        }")

      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" != "200" ]; then
        echo "ERROR: NebulaCR auth failed (HTTP ${HTTP_CODE})"
        exit 1
      fi

      ACCESS_TOKEN=$(echo "$BODY" | jq -r '.token')

    # Write Docker config for Kaniko.
    # Kaniko reads /kaniko/.docker/config.json for registry credentials.
    # We use base64-encoded auth in the Docker config format.
    - |
      AUTH_B64=$(echo -n "gitlab-ci:${ACCESS_TOKEN}" | base64 -w0)
      mkdir -p /kaniko/.docker
      cat > /kaniko/.docker/config.json <<DOCKERCFG
      {
        "auths": {
          "${NEBULACR_REGISTRY}": {
            "auth": "${AUTH_B64}"
          }
        }
      }
      DOCKERCFG

    # Build and push with Kaniko
    # --context: build context (current directory)
    # --dockerfile: path to Dockerfile
    # --destination: full image reference(s) to push
    # --cache: enable layer caching (requires pull access)
    # --cache-repo: where to store/read cache layers
    # --reproducible: produce deterministic image layers
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --destination "${IMAGE_REF}:${CI_COMMIT_SHA}" \
        --destination "${IMAGE_REF}:${CI_COMMIT_REF_SLUG}" \
        --cache=true \
        --cache-repo="${IMAGE_REF}/cache" \
        --reproducible \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --build-arg "VCS_REF=${CI_COMMIT_SHA}" \
        --snapshotMode=redo \
        --verbosity=info

  after_script:
    # Clean up the Docker config containing the token
    - rm -f /kaniko/.docker/config.json 2>/dev/null || true
  rules:
    # Only run Kaniko build when explicitly requested via CI variable
    # (default pipeline uses Docker-in-Docker above)
    - if: $CI_COMMIT_BRANCH == "main" && $USE_KANIKO == "true"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $USE_KANIKO == "true"

# ===========================================================================
# Stage: scan
#
# Scan the built image for known vulnerabilities using Trivy.
# The image is loaded from the build artifact tarball.
# ===========================================================================
scan:trivy:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Load the image from the build artifact
    # (Trivy can scan tar archives directly)
    - |
      echo "Scanning image for vulnerabilities..."
      trivy image \
        --input /build/image.tar \
        --severity "CRITICAL,HIGH" \
        --format table \
        --exit-code 0 \
        --output trivy-report.txt

    # Also generate JSON report for programmatic consumption
    - |
      trivy image \
        --input /build/image.tar \
        --severity "CRITICAL,HIGH" \
        --format json \
        --output trivy-report.json

    # Fail on critical vulnerabilities (configurable)
    - |
      CRITICAL_COUNT=$(trivy image \
        --input /build/image.tar \
        --severity "CRITICAL" \
        --format json \
        --quiet | jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0')

      echo "Critical vulnerabilities found: ${CRITICAL_COUNT}"
      if [ "${CRITICAL_COUNT}" -gt 0 ] && [ "${ALLOW_CRITICAL_VULNS}" != "true" ]; then
        echo "ERROR: ${CRITICAL_COUNT} critical vulnerabilities found. Set ALLOW_CRITICAL_VULNS=true to override."
        cat trivy-report.txt
        exit 1
      fi

  artifacts:
    paths:
      - trivy-report.txt
      - trivy-report.json
    reports:
      # GitLab can parse Trivy's GitLab-format output for the Security tab
      container_scanning: trivy-report.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  needs:
    - job: build:docker
      optional: true
    - job: build:kaniko
      optional: true

# ===========================================================================
# Stage: push
#
# Push the scanned image to NebulaCR. This stage only runs on the main
# branch (not on merge requests) to prevent unreviewed code from being
# pushed to the registry.
# ===========================================================================
push:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    *nebulacr_auth
  script:
    # Authenticate with push scope
    - nebulacr_authenticate '["pull", "push"]'
    - *docker_login

    # Load the image from the build artifact
    - docker load -i /build/image.tar

    # Re-tag if needed (the image was saved with the SHA tag)
    - docker tag "${IMAGE_REF}:${CI_COMMIT_SHA}" "${IMAGE_REF}:${CI_COMMIT_REF_SLUG}"
    - |
      if [ "${CI_COMMIT_BRANCH}" = "main" ]; then
        docker tag "${IMAGE_REF}:${CI_COMMIT_SHA}" "${IMAGE_REF}:latest"
      fi

    # Push all tags
    - docker push "${IMAGE_REF}:${CI_COMMIT_SHA}"
    - docker push "${IMAGE_REF}:${CI_COMMIT_REF_SLUG}"
    - |
      if [ "${CI_COMMIT_BRANCH}" = "main" ]; then
        docker push "${IMAGE_REF}:latest"
      fi

    - echo "Image pushed successfully"
    - echo "  ${IMAGE_REF}:${CI_COMMIT_SHA}"
    - echo "  ${IMAGE_REF}:${CI_COMMIT_REF_SLUG}"

  after_script:
    - docker logout "${NEBULACR_REGISTRY}" 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - scan:trivy

# ===========================================================================
# Stage: deploy
#
# Update deployment manifests or trigger a deployment pipeline.
# This is a placeholder -- replace with your actual deployment strategy.
# ===========================================================================
deploy:staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - |
      echo "Updating staging deployment to use image:"
      echo "  ${IMAGE_REF}:${CI_COMMIT_SHA}"

    # Example: update a Kubernetes deployment
    # kubectl set image deployment/my-app \
    #   my-app="${IMAGE_REF}:${CI_COMMIT_SHA}" \
    #   --namespace=staging

    # Example: trigger an ArgoCD sync
    # argocd app set my-app \
    #   --parameter image.tag="${CI_COMMIT_SHA}" \
    #   --grpc-web

    - echo "Deployment update triggered for staging"

  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - push
  environment:
    name: staging
    url: https://staging.example.com

# ===========================================================================
# Stage: verify (runs after push)
#
# Verify the pushed image is accessible from NebulaCR.
# ===========================================================================
verify:
  stage: deploy  # Runs in the deploy stage after push
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    *nebulacr_auth
  script:
    # Authenticate with pull-only scope for verification
    - nebulacr_authenticate '["pull"]'
    - *docker_login

    # Pull the image to verify it is accessible
    - docker pull "${IMAGE_REF}:${CI_COMMIT_SHA}"
    - echo "Image verified successfully"
    - docker inspect "${IMAGE_REF}:${CI_COMMIT_SHA}" --format '{{.RepoDigests}}'

  after_script:
    - docker logout "${NEBULACR_REGISTRY}" 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - push
