apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nebulacr.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebulacr.registry.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.registry.enabled }}
  replicas: {{ .Values.registry.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nebulacr.registry.selectorLabels" . | nindent 6 }}
  {{- if and (eq .Values.storage.backend "filesystem") .Values.storage.filesystem.persistence.enabled }}
  strategy:
    type: Recreate
  {{- else }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.registry.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nebulacr.registry.selectorLabels" . | nindent 8 }}
        {{- with .Values.registry.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nebulacr.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.registry.securityContext | nindent 8 }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "nebulacr.registry.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
        {{- with .Values.registry.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.registry.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.registry.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: registry
          image: {{ include "nebulacr.registry.image" . }}
          imagePullPolicy: {{ .Values.registry.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.registry.containerSecurityContext | nindent 12 }}
          args:
            - nebula-registry
            - serve
            - --config=/etc/nebulacr/config/registry.yaml
          ports:
            - name: http
              containerPort: {{ .Values.registry.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.registry.metricsPort }}
              protocol: TCP
          env:
            - name: NEBULACR_LOG_LEVEL
              value: {{ .Values.observability.logLevel | quote }}
            - name: NEBULACR_AUTH_REALM
              value: "/auth/token"
            {{- if and .Values.oidc.enabled .Values.oidc.clientSecret }}
            - name: NEBULACR_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.fullname" . }}-oidc
                  key: client-secret
            {{- end }}
            {{- if and (eq .Values.storage.backend "s3") (or .Values.storage.s3.existingSecret .Values.storage.s3.accessKey) }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.s3.secretName" . }}
                  key: {{ .Values.storage.s3.accessKeyField }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.s3.secretName" . }}
                  key: {{ .Values.storage.s3.secretKeyField }}
            {{- end }}
            {{- if and (eq .Values.storage.backend "azure") (or .Values.storage.azure.existingSecret .Values.storage.azure.accountKey) }}
            - name: AZURE_STORAGE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.azure.secretName" . }}
                  key: {{ .Values.storage.azure.accountKeyField }}
            {{- end }}
            {{- if .Values.pullThroughCache.enabled }}
            {{- range $name, $upstream := .Values.pullThroughCache.upstreams }}
            {{- if or $upstream.existingSecret $upstream.username }}
            {{- $envPrefix := $name | upper | replace "." "_" | replace "-" "_" }}
            {{- $secretName := include "nebulacr.upstream.secretName" (list (include "nebulacr.fullname" $) $name $upstream) }}
            - name: {{ $envPrefix }}_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default "username" $upstream.usernameField }}
            - name: {{ $envPrefix }}_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default "password" $upstream.passwordField }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.observability.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            {{- end }}
            {{- with .Values.registry.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            {{- toYaml .Values.registry.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/nebulacr/config
              readOnly: true
            - name: signing-keys
              mountPath: /etc/nebulacr/keys
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if eq .Values.storage.backend "filesystem" }}
            - name: data
              mountPath: {{ .Values.storage.filesystem.rootDirectory }}
            {{- end }}
            {{- if eq .Values.storage.backend "gcs" }}
            - name: gcs-keyfile
              mountPath: /etc/nebulacr/gcs
              readOnly: true
            {{- end }}
            {{- with .Values.registry.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "nebulacr.configMapName" . }}
        - name: signing-keys
          secret:
            secretName: {{ include "nebulacr.jwt.secretName" . }}
            defaultMode: 0440
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- if eq .Values.storage.backend "filesystem" }}
        - name: data
          {{- if .Values.storage.filesystem.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "nebulacr.fullname" .)) .Values.storage.filesystem.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if eq .Values.storage.backend "gcs" }}
        - name: gcs-keyfile
          secret:
            secretName: {{ include "nebulacr.gcs.secretName" . }}
            defaultMode: 0440
        {{- end }}
        {{- with .Values.registry.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
---
{{- if and (eq .Values.storage.backend "filesystem") .Values.storage.filesystem.persistence.enabled (not .Values.storage.filesystem.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nebulacr.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebulacr.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.storage.filesystem.persistence.accessMode }}
  {{- if .Values.storage.filesystem.persistence.storageClass }}
  storageClassName: {{ .Values.storage.filesystem.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.filesystem.persistence.size }}
{{- end }}
