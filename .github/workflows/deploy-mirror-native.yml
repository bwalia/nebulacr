name: Deploy Mirror (Native via Ansible)

on:
  push:
    branches: [main]
    paths:
      - "deploy/ansible/**"
  workflow_dispatch:
    inputs:
      version:
        description: "NebulaCR image tag to deploy"
        required: false
        default: "latest"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-mirror:
    name: Deploy NebulaCR Mirror
    runs-on: [self-hosted, test]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          which ansible-playbook > /dev/null 2>&1 || {
            sudo apt-get update -qq
            sudo apt-get install -y -qq ansible sshpass
          }
          ansible --version | head -1

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MIRROR_SSH_KEY }}" > ~/.ssh/mirror_key
          chmod 600 ~/.ssh/mirror_key
          ssh-keyscan -H 187.77.179.206 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
        run: |
          cd deploy/ansible
          ansible-playbook -i inventory.yml deploy-mirror.yml \
            --private-key ~/.ssh/mirror_key \
            -e "nebulacr_version=${{ github.event.inputs.version || 'latest' }}" \
            -v

      - name: Verify deployment
        run: |
          echo "Testing mirror health..."
          for i in 1 2 3 4 5; do
            if ssh -i ~/.ssh/mirror_key -o StrictHostKeyChecking=no root@187.77.179.206 \
              "curl -sf http://127.0.0.1:5050/health" 2>/dev/null; then
              echo ""
              echo "Mirror is healthy!"
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 5
          done
          echo "::error::Mirror health check failed"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/mirror_key
