name: Deploy to k3s

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/nebulacr/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "acc"
        type: choice
        options:
          - acc

env:
  RELEASE_NAME: nebulacr
  CHART_PATH: deploy/helm/nebulacr

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'acc' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'acc' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Determine values file
        id: values
        run: |
          ENV="${{ github.event.inputs.environment || 'acc' }}"
          VALUES_FILE="${CHART_PATH}/values-${ENV}.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Values file not found: $VALUES_FILE"
            exit 1
          fi
          echo "file=$VALUES_FILE" >> "$GITHUB_OUTPUT"
          echo "namespace=$ENV" >> "$GITHUB_OUTPUT"
          echo "Using values: $VALUES_FILE"

      - name: Helm dependency update
        run: helm dependency update "$CHART_PATH" || true

      - name: Helm diff (dry-run)
        run: |
          echo "=== Dry-run diff ==="
          helm upgrade "$RELEASE_NAME" "$CHART_PATH" \
            -n "${{ steps.values.outputs.namespace }}" \
            -f "${{ steps.values.outputs.file }}" \
            --dry-run --debug 2>&1 | tail -50

      - name: Deploy with Helm
        run: |
          helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            -n "${{ steps.values.outputs.namespace }}" \
            -f "${{ steps.values.outputs.file }}" \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr -o wide

          echo ""
          echo "=== Deployment status ==="
          kubectl get deploy -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr

          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr

      - name: Smoke test
        run: |
          REGISTRY_HOST=$(kubectl get ingress -n "${{ steps.values.outputs.namespace }}" \
            "$RELEASE_NAME" -o jsonpath='{.spec.rules[0].host}')
          echo "Registry: $REGISTRY_HOST"

          # Test via cluster-internal service
          AUTH_SVC="nebulacr-auth.${{ steps.values.outputs.namespace }}.svc.cluster.local:5001"
          REG_SVC="nebulacr-registry.${{ steps.values.outputs.namespace }}.svc.cluster.local:5000"

          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -n "${{ steps.values.outputs.namespace }}" -- \
            sh -c "
              echo '=== Registry health ===' && \
              curl -sf http://${REG_SVC}/health && echo && \
              echo '=== Auth health ===' && \
              curl -sf http://${AUTH_SVC}/health && echo && \
              echo '=== Registry v2 ===' && \
              curl -sf http://${REG_SVC}/v2/ && echo && \
              echo '=== Smoke test PASSED ==='
            "
