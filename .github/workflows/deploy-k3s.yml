name: Deploy to k3s

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/nebulacr/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "acc"
        type: choice
        options:
          - acc

env:
  RELEASE_NAME: nebulacr
  CHART_PATH: deploy/helm/nebulacr

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'acc' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'acc' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Determine values file
        id: values
        run: |
          ENV="${{ github.event.inputs.environment || 'acc' }}"
          VALUES_FILE="${CHART_PATH}/values-${ENV}.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Values file not found: $VALUES_FILE"
            exit 1
          fi
          echo "file=$VALUES_FILE" >> "$GITHUB_OUTPUT"
          echo "namespace=$ENV" >> "$GITHUB_OUTPUT"
          echo "Using values: $VALUES_FILE"

      - name: Helm dependency update
        run: helm dependency update "$CHART_PATH" || true

      - name: Helm diff (dry-run)
        run: |
          echo "=== Dry-run diff ==="
          helm upgrade "$RELEASE_NAME" "$CHART_PATH" \
            -n "${{ steps.values.outputs.namespace }}" \
            -f "${{ steps.values.outputs.file }}" \
            --dry-run --debug 2>&1 | tail -50

      - name: Deploy with Helm
        run: |
          # Bump a pod-annotation every run so pods roll even when the tag is
          # :latest and the spec is otherwise unchanged. Without this a helm
          # upgrade with unchanged values is a no-op and new images never get
          # pulled — which bit us once. The chart reads these under
          # .Values.registry.podAnnotations / .Values.auth.podAnnotations
          # (per-component), so the --set paths must match.
          ROLL_ID="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA:0:7}"
          helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            -n "${{ steps.values.outputs.namespace }}" \
            -f "${{ steps.values.outputs.file }}" \
            --set "registry.podAnnotations.nebulacr\\.io/rolled-at=${ROLL_ID}" \
            --set "auth.podAnnotations.nebulacr\\.io/rolled-at=${ROLL_ID}" \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr -o wide

          echo ""
          echo "=== Deployment status ==="
          kubectl get deploy -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr

          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr

      - name: Smoke test
        run: |
          NS="${{ steps.values.outputs.namespace }}"
          REGISTRY_HOST=$(kubectl get ingress -n "$NS" \
            "$RELEASE_NAME" -o jsonpath='{.spec.rules[0].host}')
          echo "Registry: $REGISTRY_HOST"

          # Two-stage smoke test:
          #   1. Try the external ingress (covers DNS + TLS + cert + ingress
          #      controller). If the public proxy is up, this is the most
          #      end-to-end check we can do.
          #   2. If the ingress is unreachable (transient proxy outage,
          #      certbot challenge in flight, etc.), fall back to an
          #      in-cluster check via `kubectl exec` against the registry
          #      service. This proves the deployment is healthy even when
          #      the external path is degraded.
          #
          # Each curl gets explicit --connect-timeout and --max-time so a
          # hanging proxy doesn't burn 2-minute connect timeouts per
          # attempt and starve the loop budget.

          v2_ok() {
            # $1 = base URL, no trailing slash. Echoes "PASS" on success
            # via stdout; non-zero exit on failure.
            local base="$1"
            curl -fsS --connect-timeout 5 --max-time 15 \
              "${base}/health" >/dev/null || return 1
            local code
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 --max-time 15 \
              -H "Accept: application/json" "${base}/v2/" || echo "000")
            case "$code" in
              200|401) echo "PASS"; return 0 ;;
              *)       echo "::error::Unexpected /v2/ status: $code" >&2; return 1 ;;
            esac
          }

          # Stage 1 — external ingress, retried with backoff.
          for i in 1 2 3 4 5 6; do
            if [ "$(v2_ok "https://$REGISTRY_HOST" || true)" = "PASS" ]; then
              echo "=== Smoke test PASSED via ingress (attempt $i) ==="
              exit 0
            fi
            echo "ingress attempt $i: not ready yet (proxy may be transient)"
            sleep $((i * 5))
          done
          echo "::warning::External ingress unreachable; falling back to in-cluster check"

          # Stage 2 — in-cluster via `kubectl exec` against an existing
          # registry pod. Picks any pod from the deployment and shells out
          # to whatever HTTP client it has (curl preferred, wget as
          # fallback). The registry image ships busybox-style wget so this
          # works without sidecars.
          POD=$(kubectl get pods -n "$NS" \
            -l app.kubernetes.io/name=nebulacr-registry \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -z "$POD" ]; then
            echo "::error::No registry pods labelled app.kubernetes.io/name=nebulacr-registry in $NS"
            exit 1
          fi
          echo "Probing pod: $POD"

          probe() {
            # Try curl, then wget. Both ship in different base images;
            # whichever one's present wins. Returns the HTTP body on
            # success or non-zero on failure.
            local path="$1"
            kubectl exec -n "$NS" "$POD" -c registry -- \
              sh -c "command -v curl >/dev/null && curl -fsS --max-time 10 http://localhost:5000${path} \
                  || (command -v wget >/dev/null && wget -qO- --timeout=10 http://localhost:5000${path})"
          }

          if ! probe "/health"; then
            echo "::error::In-cluster /health probe failed against pod $POD"
            kubectl logs -n "$NS" "$POD" -c registry --tail=50 || true
            exit 1
          fi
          V2_STATUS=$(kubectl exec -n "$NS" "$POD" -c registry -- \
            sh -c 'command -v curl >/dev/null \
              && curl -sS -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:5000/v2/ \
              || (command -v wget >/dev/null && wget -qSO /dev/null --timeout=10 http://localhost:5000/v2/ 2>&1 \
                  | awk "/HTTP/{print \$2; exit}")' || echo "000")
          echo "in-cluster /v2 status: $V2_STATUS"
          case "$V2_STATUS" in
            200|401) echo "=== Smoke test PASSED via in-cluster fallback ===" ;;
            *)       echo "::error::In-cluster /v2/ returned unexpected $V2_STATUS"
                     kubectl logs -n "$NS" "$POD" -c registry --tail=50 || true
                     exit 1 ;;
          esac
