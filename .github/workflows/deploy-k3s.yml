name: Deploy to k3s

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/nebulacr/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "acc"
        type: choice
        options:
          - acc

env:
  RELEASE_NAME: nebulacr
  CHART_PATH: deploy/helm/nebulacr

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'acc' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'acc' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Determine values file
        id: values
        run: |
          ENV="${{ github.event.inputs.environment || 'acc' }}"
          VALUES_FILE="${CHART_PATH}/values-${ENV}.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Values file not found: $VALUES_FILE"
            exit 1
          fi
          echo "file=$VALUES_FILE" >> "$GITHUB_OUTPUT"
          echo "namespace=$ENV" >> "$GITHUB_OUTPUT"
          echo "Using values: $VALUES_FILE"

      - name: Helm dependency update
        run: helm dependency update "$CHART_PATH" || true

      - name: Helm diff (dry-run)
        run: |
          echo "=== Dry-run diff ==="
          helm upgrade "$RELEASE_NAME" "$CHART_PATH" \
            -n "${{ steps.values.outputs.namespace }}" \
            -f "${{ steps.values.outputs.file }}" \
            --dry-run --debug 2>&1 | tail -50

      - name: Deploy with Helm
        run: |
          # Bump a pod-annotation every run so pods roll even when the tag is
          # :latest and the spec is otherwise unchanged. Without this a helm
          # upgrade with unchanged values is a no-op and new images never get
          # pulled — which bit us once.
          ROLL_ID="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA:0:7}"
          helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            -n "${{ steps.values.outputs.namespace }}" \
            -f "${{ steps.values.outputs.file }}" \
            --set "podAnnotations.nebulacr\\.io/rolled-at=${ROLL_ID}" \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr -o wide

          echo ""
          echo "=== Deployment status ==="
          kubectl get deploy -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr

          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n "${{ steps.values.outputs.namespace }}" \
            -l app.kubernetes.io/part-of=nebulacr

      - name: Smoke test
        run: |
          NS="${{ steps.values.outputs.namespace }}"
          REGISTRY_HOST=$(kubectl get ingress -n "$NS" \
            "$RELEASE_NAME" -o jsonpath='{.spec.rules[0].host}')
          echo "Registry: $REGISTRY_HOST"

          # Prefer the external ingress — the NetworkPolicy restricts intra-
          # namespace traffic to labelled pods, so a random curl sidecar gets
          # connection-refused even when the registry is healthy.
          for i in 1 2 3 4 5 6; do
            if curl -fsS "https://$REGISTRY_HOST/health" >/dev/null 2>&1; then
              echo "=== Registry health OK (via ingress) ==="
              curl -fsS "https://$REGISTRY_HOST/health" && echo
              curl -fsS "https://$REGISTRY_HOST/v2/" -H "Accept: application/json" -o /dev/null -w "v2 status: %{http_code}\n"
              echo "=== Smoke test PASSED ==="
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            sleep 10
          done
          echo "::error::Smoke test failed — /health unreachable via ingress after 6 attempts"
          exit 1
